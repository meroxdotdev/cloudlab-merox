services:
  agents-dashboard:
    image: nginx:alpine
    container_name: agents-dashboard
    restart: unless-stopped
    volumes:
      - /srv/dashboard:/usr/share/nginx/html:ro
      - /srv/docker/oracle-cloud/agents-dashboard/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      network-cloud-merox:
        ipv4_address: 172.25.10.91
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.agents-dashboard.rule=Host(`news.cloud.merox.dev`) || Host(`agents.cloud.merox.dev`)"
      - "traefik.http.routers.agents-dashboard.entrypoints=https"
      - "traefik.http.routers.agents-dashboard.tls.certresolver=cloudflare"
      - "traefik.http.services.agents-dashboard.loadbalancer.server.port=80"

networks:
  network-cloud-merox:
    external: true
