server {
    listen 80;
    server_name news.cloud.merox.dev;
    root /usr/share/nginx/html;
    index news.html;
    location /data/ {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
        try_files $uri =404;
    }
    location / {
        try_files $uri news.html =404;
    }
}

server {
    listen 80 default_server;
    root /usr/share/nginx/html;
    index index.html;
    location /data/ {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
        try_files $uri =404;
    }
    location / {
        try_files $uri $uri/ =404;
    }
}
