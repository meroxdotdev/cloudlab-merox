services:
  filebrowser:
    image: filebrowser/filebrowser:latest
    container_name: filebrowser
    restart: unless-stopped
    user: "0"
    command: ["--database=/database/filebrowser.db", "--root=/srv"]
    volumes:
      - /mnt/nas:/srv/nas
      - /srv/backups:/srv/backups:ro
      - /srv/docker/oracle-cloud/filebrowser/database:/database
      - /etc/localtime:/etc/localtime:ro
    networks:
      network-cloud-merox:
        ipv4_address: 172.25.10.80
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.filebrowser.rule=Host(`files.merox.dev`)"
      - "traefik.http.routers.filebrowser.entrypoints=https"
      - "traefik.http.routers.filebrowser.tls.certresolver=cloudflare"
      - "traefik.http.routers.filebrowser.middlewares=middlewares-authentik@file,default-headers@file"
      - "traefik.http.services.filebrowser.loadbalancer.server.port=80"

networks:
  network-cloud-merox:
    external: true
