http:
  routers:
    jellyfin:
      entryPoints:
        - "https"
      rule: "Host(`media.merox.dev`)"
      middlewares:
        - default-headers
        - rate-limit-media
      tls:
        certResolver: cloudflare
      service: jellyfin

    guacamole:
      entryPoints:
        - "https"
      rule: "Host(`rmt.merox.dev`)"
      middlewares:
        - middlewares-authentik
        - default-headers
      tls:
        certResolver: cloudflare
      service: guacamole

  services:
    jellyfin:
      loadBalancer:
        servers:
          - url: "http://10.57.57.80:30096"
          - url: "http://10.57.57.82:30096"
          - url: "http://10.57.57.84:30096"
        passHostHeader: true

    guacamole:
      loadBalancer:
        servers:
          - url: "http://172.25.10.33:8080"
        passHostHeader: true

  middlewares:
    https-redirectscheme:
      redirectScheme:
        scheme: https
        permanent: true

    middlewares-authentik:
      forwardAuth:
        address: "http://authentik-server:9000/outpost.goauthentik.io/auth/traefik"
        trustForwardHeader: true
        authResponseHeaders:
          - X-authentik-username
          - X-authentik-groups
          - X-authentik-email
          - X-authentik-name
          - X-authentik-uid
          - X-authentik-jwt
          - X-authentik-meta-jwks
          - X-authentik-meta-outpost
          - X-authentik-meta-provider
          - X-authentik-meta-app
          - X-authentik-meta-version

    default-headers:
      headers:
        frameDeny: true
        browserXssFilter: true
        contentTypeNosniff: true
        forceSTSHeader: true
        stsIncludeSubdomains: true
        stsPreload: true
        stsSeconds: 15552000
        customFrameOptionsValue: SAMEORIGIN
        customRequestHeaders:
          X-Forwarded-Proto: https

    default-whitelist:
      ipAllowList:
        sourceRange:
        - "10.0.0.0/8"
        - "192.168.0.0/16"
        - "172.16.0.0/12"

    # Rate limiting pentru servicii media — max 200 req/s per IP, burst 100
    # Protejează împotriva bandwidth abuse (singurul risc real de cost OCI)
    rate-limit-media:
      rateLimit:
        average: 200
        burst: 100
        period: 1s
        sourceCriterion:
          ipStrategy:
            depth: 1

    secured:
      chain:
        middlewares:
        - default-whitelist
        - default-headers
