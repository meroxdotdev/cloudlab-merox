services:
  guacamole:
    image: flcontainers/guacamole:latest
    container_name: guacamole
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - guacamole_config:/config
      - /etc/localtime:/etc/localtime:ro
    environment:
      TZ: "Europe/Bucharest"
      EXTENSIONS: "auth-totp"
    networks:
      network-cloud-merox:
        ipv4_address: 172.25.10.33
    labels:
      - "traefik.enable=false"

volumes:
  guacamole_config:

networks:
  network-cloud-merox:
    external: true
