---
title: Inside Merox Infrastructure
description: Unified Cloud, On-Premises & Media Infrastructure Management
startUrl: https://inside.merox.dev

theme: dark
color: gray
iconStyle: flat

background:
  image: https://merox.dev/assets/homelab.webp
  blur: xs
  saturate: 60
  brightness: 75
  opacity: 25
cardBlur: none

favicon: https://merox.dev/assets/img/favicons/favicon-32x32.png

# ============================================================================
# LAYOUT — 3 tabs: Cloud | On-Prem | Media
# ============================================================================
layout:

  # ── Tab: Cloud ──────────────────────────────────────────────────
  # ── Tab: Cloud ──────────────────────────────────────────────────
  Cloud Services:
    tab: Cloud
    style: row
    columns: 9
    icon: mdi-cloud-outline
    useEqualHeights: true

  System Monitoring:
    tab: Cloud
    style: row
    columns: 6
    icon: mdi-monitor-dashboard
    useEqualHeights: true

  # ── Tab: On-Prem ─────────────────────────────────────────────────
  Network & Infrastructure:
    tab: On-Prem
    style: row
    columns: 7
    icon: mdi-server-network
    useEqualHeights: true

  Kubernetes:
    tab: On-Prem
    style: row
    columns: 5
    icon: kubernetes.png
    useEqualHeights: true

  # ── Tab: Media ───────────────────────────────────────────────────
  Media:
    tab: Media
    style: row
    columns: 6
    icon: mdi-filmstrip
    useEqualHeights: true

# ============================================================================
# DISPLAY
# ============================================================================
fullWidth: true
maxGroupColumns: 10
maxBookmarkGroupColumns: 6
disableCollapse: false
groupsInitiallyCollapsed: false
useEqualHeights: true

headerStyle: boxedWidgets

quicklaunch:
  searchDescriptions: true
  hideInternetSearch: false
  showSearchSuggestions: true
  hideVisitURL: false
  provider: duckduckgo
  mobileButtonPosition: bottom-right

showStats: true
statusStyle: dot

hideVersion: false
disableUpdateCheck: false
language: en
target: _blank
hideErrors: false

instanceName: merox-main

# ============================================================================
# API PROVIDERS
# ============================================================================
providers:
  portainer:
    url: https://172.25.10.30:9443
    key: "{{HOMEPAGE_VAR_PORTAINER_KEY}}"

  proxmox:
    url: https://10.57.57.254:8006
    username: "{{HOMEPAGE_VAR_PROXMOX_USER}}"
    password: "{{HOMEPAGE_VAR_PROXMOX_PASS}}"

  longhorn:
    url: http://10.57.57.80:30887/
